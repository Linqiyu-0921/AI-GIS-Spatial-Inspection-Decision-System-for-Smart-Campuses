<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>巡查执行 — 智慧巡检</title>
<style>
:root {
  --bg: oklch(99% 0.003 240);
  --surface: oklch(100% 0 0);
  --fg: oklch(19% 0.018 240);
  --muted: oklch(48% 0.01 240);
  --border: oklch(88% 0.006 240);
  --accent: oklch(52% 0.10 250);
  --accent-bg: oklch(52% 0.10 250 / 0.08);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  --red: oklch(52% 0.16 28);
  --green: oklch(52% 0.12 145);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--fg);max-width:430px;margin:0 auto;min-height:100vh;position:relative;line-height:1.5;-webkit-font-smoothing:antialiased}
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 4px;font-size:11px;font-weight:600;font-family:var(--font-mono);font-feature-settings:"tnum" 1}
.header{display:flex;align-items:center;gap:10px;padding:6px 18px 12px}
.back-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:var(--fg)}
.back-btn svg{width:18px;height:18px}
.header-info{flex:1}
.header-task{font-size:16px;font-weight:700}
.header-location{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:1px}
.location-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.header-timer{font-size:12px;font-family:var(--font-mono);font-feature-settings:"tnum" 1;color:var(--accent);font-weight:600}
/* Plan floor */
.floor-plan{position:relative;margin:0 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;height:320px}
.floor-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600}
.floor-header .floor-label{font-size:11px;color:var(--muted);font-weight:400}
.floor-grid{position:absolute;inset:42px 0 0;overflow:hidden}
.floor-grid svg{width:100%;height:100%}
.poi-marker{position:absolute;width:28px;height:28px;transform:translate(-50%,-50%);cursor:pointer;z-index:2;transition:transform .15s}
.poi-marker:active{transform:translate(-50%,-50%) scale(1.2)}
.poi-marker svg{width:100%;height:100%}
.poi-label{position:absolute;transform:translateX(-50%);top:100%;font-size:9px;color:var(--muted);white-space:nowrap;margin-top:2px;pointer-events:none}
.poi-checked{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;top:-4px;right:-4px;z-index:3}
/* Route line */
.route-line{position:absolute;height:2px;background:var(--accent);opacity:0.4;border-radius:1px;z-index:1;pointer-events:none}
.radius-zone{position:absolute;border:2px dashed var(--accent);border-radius:50%;opacity:0.25;pointer-events:none;z-index:1}
/* Action bar */
.action-bar{display:flex;gap:8px;padding:12px 18px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 0;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--fg);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.action-btn:hover{background:var(--bg)}
.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.action-btn.primary:hover{filter:brightness(1.1)}
.action-btn svg{width:18px;height:18px}
/* Checklist drawer */
.checklist-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none}
.checklist-overlay.open{display:block}
.checklist-drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--surface);border-radius:12px 12px 0 0;z-index:101;padding:18px 18px calc(18px + var(--safe-bottom));max-height:60vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.drawer-title{font-size:16px;font-weight:700;margin-bottom:14px}
.check-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.checked{background:var(--accent);border-color:var(--accent)}
.check-box.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.check-text{font-size:13px;flex:1}
.check-status{font-size:11px;color:var(--muted);font-family:var(--font-mono);font-feature-settings:"tnum" 1}
.drawer-submit{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;font-family:var(--font)}
.drawer-submit:hover{filter:brightness(1.1)}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;text-decoration:none;color:var(--muted);font-size:10px;transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item.active svg{color:var(--accent)}
.nav-item span{font-weight:500}
/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--fg);color:var(--surface);padding:10px 18px;border-radius:6px;font-size:13px;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="status-bar"><span>09:41</span><span>📶 🔋 87%</span></div>

<div class="header">
  <a class="back-btn" href="mobile-task-center.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <div class="header-info">
    <div class="header-task">A区3F消防设施检查</div>
    <div class="header-location"><span class="location-dot"></span> 距目标 12m · A3F 消防通道</div>
  </div>
  <div class="header-timer">23:47</div>
</div>

<div class="floor-plan">
  <div class="floor-header">
    <span>A区 3F 平面图</span>
    <span class="floor-label">缩放/拖动查看</span>
  </div>
  <div class="floor-grid" id="floorMap">
    <!-- Floor grid lines -->
    <svg viewBox="0 0 380 278" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
      <line x1="80" y1="0" x2="80" y2="278" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <line x1="190" y1="0" x2="190" y2="278" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <line x1="290" y1="0" x2="290" y2="278" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="70" x2="380" y2="70" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="140" x2="380" y2="140" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="210" x2="380" y2="210" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>
      <!-- Room outlines -->
      <rect x="100" y="10" width="80" height="55" rx="2" stroke="var(--border)" stroke-width="1" fill="none"/>
      <rect x="100" y="75" width="80" height="55" rx="2" stroke="var(--border)" stroke-width="1" fill="none"/>
      <rect x="200" y="10" width="80" height="55" rx="2" stroke="var(--border)" stroke-width="1" fill="none"/>
      <rect x="200" y="75" width="80" height="55" rx="2" stroke="var(--border)" stroke-width="1" fill="none"/>
      <rect x="10" y="10" width="80" height="120" rx="2" stroke="var(--border)" stroke-width="1" fill="none"/>
      <!-- Corridor -->
      <rect x="10" y="140" width="360" height="60" rx="2" stroke="var(--border)" stroke-width="1" fill="none" stroke-dasharray="4 2"/>
      <!-- Room labels -->
      <text x="140" y="42" text-anchor="middle" fill="var(--muted)" font-size="8">消防控制室</text>
      <text x="140" y="107" text-anchor="middle" fill="var(--muted)" font-size="8">设备间</text>
      <text x="240" y="42" text-anchor="middle" fill="var(--muted)" font-size="8">会议室</text>
      <text x="240" y="107" text-anchor="middle" fill="var(--muted)" font-size="8">茶水间</text>
      <text x="50" y="75" text-anchor="middle" fill="var(--muted)" font-size="8">电梯厅</text>
      <text x="190" y="175" text-anchor="middle" fill="var(--muted)" font-size="8">走廊</text>
      <!-- Route line -->
      <path d="M 50 170 L 140 170 L 140 65 L 120 65" stroke="var(--accent)" stroke-width="2" opacity="0.35" stroke-dasharray="4 3" fill="none"/>
    </svg>
    <!-- POI markers -->
    <div class="poi-marker" style="left:120px;top:65px" onclick="checkPOI(this)">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="var(--accent)" opacity="0.15"/><circle cx="14" cy="14" r="6" fill="var(--accent)"/><circle cx="14" cy="14" r="3" fill="#fff"/></svg>
      <span class="poi-label">消火栓</span>
    </div>
    <div class="poi-marker" style="left:160px;top:65px" onclick="checkPOI(this)">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="var(--accent)" opacity="0.15"/><circle cx="14" cy="14" r="6" fill="var(--accent)"/><circle cx="14" cy="14" r="3" fill="#fff"/></svg>
      <span class="poi-label">喷淋阀</span>
    </div>
    <div class="poi-marker" style="left:50px;height:50px" onclick="checkPOI(this)">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="10" fill="var(--accent)" opacity="0.15"/><circle cx="14" cy="14" r="6" fill="var(--accent)"/><circle cx="14" cy="14" r="3" fill="#fff"/></svg>
      <span class="poi-label">3F电梯</span>
      <span class="poi-checked">✓</span>
    </div>
    <!-- Radius zone -->
    <div class="radius-zone" style="left:120px;top:65px;width:50px;height:50px"></div>
  </div>
</div>

<div class="action-bar">
  <button class="action-btn" onclick="showToast('路线导航中...')">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a8 8 0 0 0-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 0 0-8-8z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
    导航
  </button>
  <button class="action-btn" onclick="showToast('正在打卡...')">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    打卡
  </button>
  <button class="action-btn primary" onclick="openChecklist()">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    检查清单 (3/7)
  </button>
</div>

<div class="checklist-overlay" id="checklistOverlay" onclick="closeChecklist()"></div>
<div class="checklist-drawer" id="checklistDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">消防设施检查清单</div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box checked"></span>
    <span class="check-text">消火栓箱体完整性检查</span>
    <span class="check-status">✓ 09:05</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box checked"></span>
    <span class="check-text">消防水带压力测试</span>
    <span class="check-status">✓ 09:08</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box checked"></span>
    <span class="check-text">灭火器压力表读数记录</span>
    <span class="check-status">✓ 09:12</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box"></span>
    <span class="check-text">喷淋头外观及密封检查</span>
    <span class="check-status">—</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box"></span>
    <span class="check-text">消防报警按钮灵敏度测试</span>
    <span class="check-status">—</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box"></span>
    <span class="check-text">应急照明放电测试</span>
    <span class="check-status">—</span>
  </div>
  <div class="check-item" onclick="toggleCheck(this)">
    <span class="check-box"></span>
    <span class="check-text">疏散指示灯亮度检测</span>
    <span class="check-status">—</span>
  </div>
  <button class="drawer-submit" onclick="submitChecklist()">提交检查结果 (3/7)</button>
</div>

<nav class="bottom-nav">
  <a href="mobile-task-center.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>任务</span>
  </a>
  <a href="mobile-inspection.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a8 8 0 0 0-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 0 0-8-8z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>巡查</span>
  </a>
  <a href="mobile-ai-report.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>拍照</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
let checkedCount=3;
function checkPOI(el){const c=el.querySelector('.poi-checked');if(!c){const n=document.createElement('span');n.className='poi-checked';n.textContent='✓';el.appendChild(n);checkedCount++;showToast('已打卡 POI')}}
function openChecklist(){document.getElementById('checklistOverlay').classList.add('open');document.getElementById('checklistDrawer').style.display='block'}
function closeChecklist(){document.getElementById('checklistOverlay').classList.remove('open');document.getElementById('checklistDrawer').style.display='none'}
function toggleCheck(el){const box=el.querySelector('.check-box');box.classList.toggle('checked');checkedCount+=box.classList.contains('checked')?1:-1;const sub=document.querySelector('.drawer-submit');sub.textContent=`提交检查结果 (${checkedCount}/7)`}
function submitChecklist(){showToast(`已提交 ${checkedCount}/7 项检查结果`);closeChecklist()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
</script>
</body>
</html>
