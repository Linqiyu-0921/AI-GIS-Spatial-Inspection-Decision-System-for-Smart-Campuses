<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AI拍照上报 — 智慧巡检</title>
<style>
:root {
  --bg: oklch(99% 0.003 240);
  --surface: oklch(100% 0 0);
  --fg: oklch(19% 0.018 240);
  --muted: oklch(48% 0.01 240);
  --border: oklch(88% 0.006 240);
  --accent: oklch(52% 0.10 250);
  --accent-bg: oklch(52% 0.10 250 / 0.08);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  --red: oklch(52% 0.16 28);
  --red-bg: oklch(52% 0.16 28 / 0.08);
  --green: oklch(52% 0.12 145);
  --green-bg: oklch(52% 0.12 145 / 0.08);
  --yellow: oklch(60% 0.14 95);
  --yellow-bg: oklch(60% 0.14 95 / 0.08);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--fg);max-width:430px;margin:0 auto;min-height:100vh;position:relative;line-height:1.5;-webkit-font-smoothing:antialiased}
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 4px;font-size:11px;font-weight:600;color:var(--fg);font-family:var(--font-mono);font-feature-settings:"tnum" 1}
.status-bar svg{width:14px;height:14px;color:var(--muted)}
.status-bar-right{display:flex;align-items:center;gap:6px}
/* Viewfinder */
.viewfinder{position:relative;height:480px;background:oklch(12% 0.005 250);border-bottom:1px solid var(--border);overflow:hidden}
.viewfinder::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,0.06) 40px,rgba(255,255,255,0.06) 41px),
  repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.06) 40px,rgba(255,255,255,0.06) 41px);
  opacity:0.8;pointer-events:none;z-index:0}
.viewfinder-corners{position:absolute;inset:40px;z-index:5;pointer-events:none}
.viewfinder-corners::before,.viewfinder-corners::after{content:'';position:absolute;width:30px;height:30px;border-color:var(--accent);border-style:solid}
.viewfinder-corners::before{top:0;left:0;border-width:2px 0 0 2px}
.viewfinder-corners::after{top:0;right:0;border-width:2px 2px 0 0}
.vf-corner-br{position:absolute;bottom:0;left:0;width:30px;height:30px;border-width:0 0 2px 2px;border-style:solid;border-color:var(--accent);pointer-events:none}
.vf-corner-tr{position:absolute;bottom:0;right:0;width:30px;height:30px;border-width:0 2px 2px 0;border-style:solid;border-color:var(--accent);pointer-events:none}
.scan-line{position:absolute;left:5%;right:5%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);z-index:3;animation:scan 2.5s ease-in-out infinite;opacity:0.4;pointer-events:none}
@keyframes scan{0%{top:15%}50%{top:75%}100%{top:15%}}
/* AI overlay boxes */
.ai-overlay{position:absolute;z-index:4;pointer-events:none}
.ai-bbox{position:absolute;border:2px solid var(--accent)}
.ai-bbox-label{position:absolute;top:-20px;left:0;background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;white-space:nowrap;font-weight:600}
.ai-bbox-confidence{position:absolute;bottom:-16px;left:0;font-size:9px;color:rgba(255,255,255,0.5);font-family:var(--font-mono)}
/* Detection 1 */
.ai-detection-1{left:45px;top:100px;width:140px;height:100px}
.ai-detection-1 .ai-bbox{left:0;top:0;width:100%;height:100%;border-color:var(--accent)}
.ai-detection-1 .ai-bbox-label{background:var(--accent)}
.ai-detection-1 .ai-bbox-confidence{left:0}
/* Detection 2 */
.ai-detection-2{left:190px;top:90px;width:70px;height:50px}
.ai-detection-2 .ai-bbox{left:0;top:0;width:100%;height:100%;border-color:var(--red)}
.ai-detection-2 .ai-bbox-label{background:var(--red)}
.ai-detection-2 .ai-bbox-confidence{left:0}
/* Detection 3 */
.ai-detection-3{left:80px;top:240px;width:100px;height:80px}
.ai-detection-3 .ai-bbox{left:0;top:0;width:100%;height:100%;border-color:var(--yellow)}
.ai-detection-3 .ai-bbox-label{background:var(--yellow);color:var(--fg)}
.ai-detection-3 .ai-bbox-confidence{left:0}
/* Viewfinder bottom */
.viewfinder-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:10px}
.vf-caption{color:rgba(255,255,255,0.7);font-size:12px;display:flex;align-items:center;gap:6px}
.vf-caption-dot{width:6px;height:6px;background:var(--accent);animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.vf-actions{display:flex;align-items:center;justify-content:center;gap:12px}
.vf-btn{width:40px;height:40px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px)}
.vf-btn:hover{background:rgba(255,255,255,0.15)}
.vf-btn svg{width:20px;height:20px}
.vf-shutter{width:56px;height:56px;border:3px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.15);cursor:pointer;transition:transform .15s;display:flex;align-items:center;justify-content:center;border-radius:50%;backdrop-filter:blur(8px)}
.vf-shutter:active{transform:scale(.92)}
.vf-shutter-inner{width:44px;height:44px;background:rgba(255,255,255,0.3);border-radius:50%;border:2px solid rgba(255,255,255,0.6)}
/* Results panel */
.results-panel{background:var(--surface);border-radius:12px 12px 0 0;margin-top:-12px;position:relative;z-index:6;padding:18px 18px 100px}
.results-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-title{font-size:16px;font-weight:700}
.results-badge{font-size:10px;padding:3px 8px;background:var(--accent-bg);color:var(--accent);border-radius:4px;font-weight:600;font-family:var(--font-mono)}
.result-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.result-item:last-child{border-bottom:none}
.result-color{width:3px;height:36px;border-radius:2px;flex-shrink:0;margin-top:2px}
.result-color.blue{background:var(--accent)}
.result-color.red{background:var(--red)}
.result-color.yellow{background:var(--yellow)}
.result-content{flex:1}
.result-label{font-size:13px;font-weight:600}
.result-desc{font-size:12px;color:var(--muted);margin-top:1px}
.result-conf{font-size:11px;font-family:var(--font-mono);font-feature-settings:"tnum" 1;color:var(--muted);flex-shrink:0}
/* Report form */
.form-section{margin-top:16px}
.form-section-title{font-size:14px;font-weight:700;margin-bottom:10px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--fg);font-family:var(--font)}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--fg);font-family:var(--font);appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.form-select:focus{outline:none;border-color:var(--accent)}
.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--fg);font-family:var(--font);resize:vertical;min-height:80px}
.form-textarea:focus{outline:none;border-color:var(--accent)}
.severity-group{display:flex;gap:6px}
.severity-option{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;background:var(--bg);font-size:11px;color:var(--muted)}
.severity-option:hover{background:var(--surface)}
.severity-option.active{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:600}
.severity-option .sev-dot{width:8px;height:8px;border-radius:50%}
.severity-option .sev-dot.p0{background:var(--red)}
.severity-option .sev-dot.p1{background:var(--yellow)}
.severity-option .sev-dot.p2{background:var(--green)}
.submit-report{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:var(--font);transition:filter .15s}
.submit-report:hover{filter:brightness(1.1)}
/* Edit photo hint */
.photo-preview{display:flex;gap:8px;padding:8px 0}
.photo-thumb{width:56px;height:56px;border-radius:6px;border:1px solid var(--border);overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .add-icon{color:var(--muted);font-size:20px;font-weight:300}
/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-bottom));z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;text-decoration:none;color:var(--muted);font-size:10px;transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item.active svg{color:var(--accent)}
.nav-item span{font-weight:500}
/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--fg);color:var(--surface);padding:10px 18px;border-radius:6px;font-size:13px;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="status-bar"><span>09:41</span><span class="status-bar-right"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="12" rx="2"/><path d="M22 11v2"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 11v2M10 9v4M14 8v6M18 10v2"/></svg><span style="color:var(--fg)">87%</span></span></div>

<div class="viewfinder">
  <div class="viewfinder-corners"></div>
  <div class="vf-corner-br"></div>
  <div class="vf-corner-tr"></div>
  <div class="scan-line"></div>

  <div class="ai-overlay ai-detection-1">
    <div class="ai-bbox"></div>
    <span class="ai-bbox-label">消防喷淋头</span>
    <span class="ai-bbox-confidence">94.2%</span>
  </div>
  <div class="ai-overlay ai-detection-2">
    <div class="ai-bbox" style="border-color:var(--red)"></div>
    <span class="ai-bbox-label" style="background:var(--red)">破损区域</span>
    <span class="ai-bbox-confidence">87.6%</span>
  </div>
  <div class="ai-overlay ai-detection-3">
    <div class="ai-bbox" style="border-color:var(--yellow)"></div>
    <span class="ai-bbox-label" style="background:var(--yellow);color:var(--fg)">水渍痕迹</span>
    <span class="ai-bbox-confidence">72.1%</span>
  </div>

  <div class="viewfinder-bottom">
    <div class="vf-caption">
      <span class="vf-caption-dot"></span>
      AI 识别中 · 3 处异常
    </div>
    <div class="vf-actions">
      <button class="vf-btn" onclick="showToast('切换夜视模式')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </button>
      <button class="vf-shutter" onclick="capturePhoto()">
        <span class="vf-shutter-inner"></span>
      </button>
      <button class="vf-btn" onclick="showToast('切换摄像头')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.6"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="results-panel">
  <div class="results-handle"></div>
  <div class="results-header">
    <span class="results-title">AI 识别结果</span>
    <span class="results-badge">3 处异常</span>
  </div>

  <div class="result-item">
    <span class="result-color blue"></span>
    <div class="result-content">
      <div class="result-label">消防喷淋头</div>
      <div class="result-desc">检测到目标物，状态待检</div>
    </div>
    <span class="result-conf">94.2%</span>
  </div>
  <div class="result-item">
    <span class="result-color red"></span>
    <div class="result-content">
      <div class="result-label">破损区域</div>
      <div class="result-desc">喷淋头连接处可见裂缝，需维修</div>
    </div>
    <span class="result-conf">87.6%</span>
  </div>
  <div class="result-item">
    <span class="result-color yellow"></span>
    <div class="result-content">
      <div class="result-label">水渍痕迹</div>
      <div class="result-desc">天花板存在水渍，疑似渗漏</div>
    </div>
    <span class="result-conf">72.1%</span>
  </div>

  <div class="photo-preview">
    <div class="photo-thumb" onclick="showToast('查看大图')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="width:22px;height:22px;color:var(--muted)"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>
    <div class="photo-thumb">
      <span class="add-icon">+</span>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">上报问题</div>
    <div class="form-group">
      <span class="form-label">问题类型</span>
      <select class="form-select">
        <option>消防设备破损</option>
        <option>管道渗漏</option>
        <option>照明故障</option>
        <option>空调异常</option>
        <option>门窗损坏</option>
        <option>其他</option>
      </select>
    </div>
    <div class="form-group">
      <span class="form-label">紧急程度</span>
      <div class="severity-group">
        <div class="severity-option active" onclick="selectSeverity(this)">
          <span class="sev-dot p0"></span>
          P0 紧急
        </div>
        <div class="severity-option" onclick="selectSeverity(this)">
          <span class="sev-dot p1"></span>
          P1 重要
        </div>
        <div class="severity-option" onclick="selectSeverity(this)">
          <span class="sev-dot p2"></span>
          P2 一般
        </div>
      </div>
    </div>
    <div class="form-group">
      <span class="form-label">问题描述</span>
      <textarea class="form-textarea" placeholder="请描述发现问题的情况…">A区3F 消防喷淋头连接处可见裂缝，疑似松动，存在漏水风险。建议立即安排维修。</textarea>
    </div>
    <div class="form-group">
      <span class="form-label">所在位置</span>
      <input class="form-input" type="text" value="A区 3F 西侧消防通道" placeholder="输入位置" readonly>
    </div>
    <button class="submit-report" onclick="submitReport()">提交工单</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="mobile-task-center.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>任务</span>
  </a>
  <a href="mobile-inspection.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a8 8 0 0 0-8 8c0 6 8 12 8 12s8-6 8-12a8 8 0 0 0-8-8z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>巡查</span>
  </a>
  <a href="mobile-ai-report.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.6"/></svg>
    <span>拍照</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
function selectSeverity(el){document.querySelectorAll('.severity-option').forEach(s=>s.classList.remove('active'));el.classList.add('active')}
function capturePhoto(){showToast('AI 分析中...');setTimeout(()=>showToast('识别完成，3 处异常'),1800)}
function submitReport(){showToast('工单已提交');setTimeout(()=>window.location.href='mobile-task-center.html',1200)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
</script>
</body>
</html>
